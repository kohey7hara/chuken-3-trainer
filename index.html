<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <title>中検3級トレーナー</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Chuken Daily</p>
          <h1>中検3級トレーナー</h1>
        </div>
        <button class="icon-button" id="resetButton" type="button" aria-label="進捗をリセット">↺</button>
      </header>

      <section class="progress-panel" aria-label="学習進捗">
        <div>
          <span class="label">今日の達成</span>
          <strong id="todayDone">0/8</strong>
        </div>
        <div>
          <span class="label">連続学習</span>
          <strong><span id="streak">0</span>日</strong>
        </div>
        <div>
          <span class="label">3級まで</span>
          <strong><span id="examProgress">3</span>%</strong>
        </div>
      </section>

      <section class="mission-card" aria-labelledby="missionTitle">
        <div class="mission-heading">
          <div>
            <p class="eyebrow">Today's Mission</p>
            <h2 id="missionTitle">今日の20分セット</h2>
          </div>
          <span class="pill" id="lessonTag">Phase 1</span>
        </div>
        <div class="mission-list" id="missionList"></div>
      </section>

      <section class="content-panel" aria-label="教材量">
        <div>
          <span class="label">教材パック</span>
          <strong><span id="lessonCount">20</span>レッスン</strong>
        </div>
        <div>
          <span class="label">単語</span>
          <strong><span id="vocabCount">2000</span>語</strong>
        </div>
        <div>
          <span class="label">総カード</span>
          <strong><span id="cardCount">2060</span>問</strong>
        </div>
        <div>
          <span class="label">現在</span>
          <strong id="currentPosition">1/2060</strong>
        </div>
      </section>

      <section class="practice-area" aria-live="polite">
        <div class="practice-header">
          <div>
            <p class="eyebrow" id="practiceType">Vocabulary</p>
            <h2 id="practiceTitle">単語カード</h2>
          </div>
          <button class="audio-button" id="speakButton" type="button">音声</button>
        </div>

        <div class="question-box">
          <p class="hanzi" id="hanzi">学习</p>
          <p class="pinyin" id="pinyin">xuéxí</p>
          <p class="prompt" id="prompt">意味を選んでください。</p>
        </div>

        <div class="choices" id="choices"></div>

        <div class="answer-panel" id="answerPanel" hidden>
          <p id="answerText"></p>
          <p class="note" id="answerNote"></p>
        </div>

        <div class="actions">
          <button class="secondary-button" id="skipButton" type="button">あとで</button>
          <button class="primary-button" id="nextButton" type="button">次へ</button>
        </div>
      </section>

      <nav class="bottom-nav" aria-label="主要メニュー">
        <button class="nav-item active" type="button" data-view="today">今日</button>
        <button class="nav-item" type="button" data-view="words">単語</button>
        <button class="nav-item" type="button" data-view="grammar">文法</button>
        <button class="nav-item" type="button" data-view="listen">聞く</button>
      </nav>
      <audio id="fallbackAudio" preload="none"></audio>
    </main>

    <script src="./data.js"></script>
    <script src="./vocab-2000.js?v=ja-20260516"></script>
    <script src="./app.js?v=audio-20260516d"></script>
  </body>
</html>
